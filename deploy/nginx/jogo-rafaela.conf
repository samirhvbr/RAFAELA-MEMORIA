# ===========================================================
# Nginx vhost — Jogo da Memória da Rafaela
# Debian 12 (Bookworm) + PHP 8.2-FPM
# Copie para /etc/nginx/sites-available/jogo-rafaela e crie o symlink.
# ===========================================================

server {
    listen 80;
    listen [::]:80;
    server_name SEU_DOMINIO.com.br;   # ajuste

    root /var/www/jogo-rafaela/public;
    index index.php;

    charset utf-8;

    # Tamanho máximo de upload (a aplicação não recebe arquivos; mantém baixo).
    client_max_body_size 2M;

    # ── Cabeçalhos de segurança ─────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    # CSP: 'unsafe-inline' é necessário pelo script inline de bootstrap do jogo
    # e pelos estilos injetados pelo Vite. Pode ser endurecido com nonce no app.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;
    # HSTS: descomente APÓS habilitar HTTPS (ver docs/DEPLOY.md / Certbot).
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Roteamento Laravel ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Assets buildados pelo Vite — cache longo.
    location /build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── PHP-FPM ─────────────────────────────────────────────
    location ~ \.php$ {
        # Só executa arquivos .php que existem no disco — fecha o vetor de
        # path traversal / execução de .php inexistente repassado ao FPM.
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }

    # ── Bloqueios de segurança ──────────────────────────────
    # Nega arquivos ocultos (.env, .git, etc.), exceto .well-known (ACME/SSL).
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Nega acesso direto a arquivos sensíveis na raiz, se expostos por engano.
    location ~* \.(env|log|sqlite|md|lock|json|yml|yaml)$ {
        deny all;
    }

    # storage/ e demais diretórios da aplicação ficam fora do root (public/),
    # portanto já não são acessíveis pela web.

    error_log  /var/log/nginx/jogo-rafaela.error.log;
    access_log /var/log/nginx/jogo-rafaela.access.log;
}
